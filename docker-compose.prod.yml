name: anchordesk
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: anchor_desk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anchor_desk"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.15.4
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/6333 && printf \"GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && IFS= read -r line <&3 && case \"$$line\" in *\"200\"*) exit 0;; *) exit 1;; esac'",
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "39000:9000"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  upgrade:
    build:
      context: .
      dockerfile: Dockerfile
      target: upgrade-runtime
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "node packages/db/scripts/run-upgrades.mjs --mode=apply-blocking && node packages/storage/scripts/ensure-dev-bucket.mjs",
      ]
    restart: "no"

  # App services only need bootstrap env; all other runtime config is
  # loaded from system_settings at startup via initRuntimeSettings().
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      HOSTNAME: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "node packages/db/scripts/run-upgrades.mjs --mode=check && node packages/db/scripts/start-web-server.mjs",
      ]
    ports:
      - "33000:3000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["sh", "-lc", "node packages/db/scripts/run-upgrades.mjs --mode=check && node --import tsx src/index.ts"]
    ports:
      - "34002:4002"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent-runtime-runtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 4001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    command:
      [
        "sh",
        "-lc",
        "node packages/db/scripts/run-upgrades.mjs --mode=check && node --import tsx src/index.ts",
      ]
    ports:
      - "34001:4001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  parser:
    build:
      context: .
      dockerfile: services/parser/Dockerfile
    env_file:
      - .env.production
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "38001:8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
